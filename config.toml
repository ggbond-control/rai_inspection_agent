[vendor]
simple_model = "openai.vlm"
complex_model = "openai.vlm"
embeddings_model = "openai.embeddings"

[aws]
simple_model = "anthropic.claude-3-haiku-20240307-v1:0"
complex_model = "anthropic.claude-3-5-sonnet-20240620-v1:0"
embeddings_model = "amazon.titan-embed-text-v1"
region_name = "us-east-1"

[openai]
base_url = "http://10.0.40.149:11451/v1"
api_key = "EMPTY"
model = "qwen27b-mtp"

[openai.vlm]
base_url = "http://10.0.40.149:11451/v1"
api_key = "EMPTY"
model = "qwen27b-mtp"

[openai.embeddings]
base_url = "http://10.0.40.149:11452/v1"
api_key = "EMPTY"
model = "qwen3e"

[ollama]
base_url = "http://10.0.40.149:11434"
simple_model = "qwen3.6:27b-q4_K_M"
complex_model = "qwen3.6:27b-q4_K_M"
embeddings_model = "nomic-embed-text-v2-moe:latest"

[google]
simple_model = "gemini-3-flash"
complex_model = "gemini-3-pro"
embeddings_model = "text-embedding-004"

[tracing]
project = "rai"

[tracing.langfuse]
use_langfuse = false
host = "http://localhost:3000"

[tracing.langsmith]
use_langsmith = false
host = "https://api.smith.langchain.com"

[context]
# This is the operational budget, not the model's advertised context window.
# Lower it on edge devices when long contexts cause unacceptable latency.
enabled = true
max_input_tokens = 12288
trigger_ratio = 0.67
keep_ratio = 0.25
max_messages = 80
summary_max_tokens = 1024
chars_per_token = 2.0
tokens_per_image = 1024

[asr]
recording_device_name = "default"
transcription_model = "LocalWhisper"
language = "en"
vad_model = "SileroVAD"
silence_grace_period = 0.3
vad_threshold = 0.3
use_wake_word = false
wake_word_model = ""
wake_word_threshold = 0.5
wake_word_model_name = ""
transcription_model_name = "tiny"

[tts]
vendor = "ElevenLabs"
voice = ""
speaker_device_name = "default"

[memory]
enabled = true
backend = "sqlite"
short_term_path = "data/checkpoints.db"
long_term_path = "data/store.db"
connection = ""
namespace = "default"
checkpoint_prune_after_turn = true
checkpoint_keep_per_thread = 20
checkpoint_warn_mb = 512

[whoami]
enabled = true
root_dir = "data/rosbotxl_whoami"
build_vector_db = true

[whoami.retrieval]
strategy = "vector"
vector_k = 8
keyword_k = 8
final_k = 4
normalize_embeddings = true
distance_strategy = "inner_product"
